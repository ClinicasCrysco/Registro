<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Financiero - Clínica</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com/"></script>
    <style>
        .transition-theme { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .mode-ingreso { border-color: #10b981; }
        .mode-egreso { border-color: #ef4444; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <div id="main-card" class="max-w-md w-full bg-white rounded-3xl shadow-2xl shadow-slate-200/50 overflow-hidden border-t-[8px] transition-theme mode-ingreso">
        <div class="p-8">
            <!-- Header -->
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h1 id="form-title" class="text-2xl font-black text-slate-800 tracking-tight">Nuevo Ingreso</h1>
                    <p class="text-xs text-slate-400 font-bold uppercase tracking-widest">Control Financiero</p>
                </div>
            </div>

            <form id="transaction-form" class="space-y-5">
                <!-- Selector de Tipo (Toggle) -->
                <div class="grid grid-cols-2 gap-2 p-1 bg-slate-100 rounded-2xl">
                    <button type="button" onclick="setMode('ingreso')" id="btn-mode-ingreso" class="py-2 text-xs font-black uppercase rounded-xl transition-all bg-white text-emerald-600 shadow-sm">Ingreso</button>
                    <button type="button" onclick="setMode('egreso')" id="btn-mode-egreso" class="py-2 text-xs font-black uppercase rounded-xl transition-all text-slate-400">Egreso</button>
                    <input type="hidden" id="tipo" value="ingreso">
                </div>

                <!-- Monto -->
                <div class="relative">
                    <label class="text-[10px] font-black uppercase text-slate-400 ml-1">Monto del Movimiento</label>
                    <div class="relative mt-1">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 font-bold text-slate-400">$</span>
                        <input type="number" step="0.01" id="monto" class="w-full bg-slate-50 border border-slate-200 pl-8 pr-4 py-4 rounded-2xl text-xl font-black text-slate-700 outline-none focus:ring-4 focus:ring-emerald-500/10 focus:border-emerald-500 transition-all" placeholder="0.00" required autofocus>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <!-- Sucursal -->
                    <div>
                        <label class="text-[10px] font-black uppercase text-slate-400 ml-1">Sucursal</label>
                        <select id="sucursal_id" class="w-full mt-1 bg-slate-50 border border-slate-200 p-3 rounded-xl text-sm font-bold text-slate-600 outline-none appearance-none cursor-pointer">
                            <option value="2">Colonia Médica</option>
                            <option value="3">Santa Tecla</option>
                        </select>
                    </div>
                    <!-- Fecha -->
                    <div>
                        <label class="text-[10px] font-black uppercase text-slate-400 ml-1">Fecha</label>
                        <input type="date" id="fecha" class="w-full mt-1 bg-slate-50 border border-slate-200 p-3 rounded-xl text-sm font-bold text-slate-600 outline-none">
                    </div>
                </div>

                <!-- Categoría Dinámica -->
                <div>
                    <label class="text-[10px] font-black uppercase text-slate-400 ml-1">Categoría Detallada</label>
                    <select id="categoria" class="w-full mt-1 bg-slate-50 border border-slate-200 p-3 rounded-xl text-sm font-bold text-slate-600 outline-none appearance-none cursor-pointer" required>
                        <!-- Se llena con JS -->
                    </select>
                </div>

                <!-- Método de Pago -->
                <div>
                    <label class="text-[10px] font-black uppercase text-slate-400 ml-1">Método de Pago</label>
                    <select id="metodo_pago_id" class="w-full mt-1 bg-slate-50 border border-slate-200 p-3 rounded-xl text-sm font-bold text-slate-600 outline-none appearance-none cursor-pointer" required>
                        <option value="1">Efectivo</option>
                        <option value="2">Transferencia</option>
                    </select>
                </div>

                <!-- Descripción -->
                <div>
                    <label class="text-[10px] font-black uppercase text-slate-400 ml-1">Comentarios (Opcional)</label>
                    <textarea id="descripcion" rows="2" class="w-full mt-1 bg-slate-50 border border-slate-200 p-3 rounded-xl text-sm font-medium text-slate-600 outline-none resize-none" placeholder="Escribe aquí detalles adicionales..."></textarea>
                </div>

                <!-- Botón Guardar -->
                <button type="submit" id="btn-save" class="w-full py-4 rounded-2xl font-black text-white shadow-lg shadow-emerald-200 bg-emerald-500 hover:bg-emerald-600 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                    <span id="btn-text">Guardar Registro</span>
                </button>
            </form>
        </div>
    </div>

    <script>
        const SB_URL = 'https://zupdtozdvqomfinytkcz.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp1cGR0b3pkdnFvbWZpbnl0a2N6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2MTQ4OTcsImV4cCI6MjA5MzE5MDg5N30.PI8PmiLUXR_iYugDfbtZKhaZbS-Iv5T9jNLs0XsvY9E';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        const CATEGORIAS = {
            ingreso: [
                { id: 1, nombre: "FONAT" },
                { id: 2, nombre: "MAPFRE" },
                { id: 3, nombre: "RPN" },
                { id: 4, nombre: "ASESUISA" },
                { id: 5, nombre: "PALIG" },
                { id: 6, nombre: "Coaseguro" },
                { id: 7, nombre: "Redes Sociales" },
                { id: 8, nombre: "Referidos" },
                { id: 9, nombre: "Particulares" },
                { id: 10, nombre: "Pacientes Empresariales" },
                { id: 11, nombre: "Venta Productos" },
                { id: 12, nombre: "Otro" }
            ],
            egreso: [
                { id: 13, nombre: "Salarios" },
                { id: 14, nombre: "Alquiler" },
                { id: 15, nombre: "Impuestos" },
                { id: 16, nombre: "Créditos" },
                { id: 17, nombre: "Prestaciones" },
                { id: 18, nombre: "Servicios Profesionales" },
                { id: 19, nombre: "Cuentas por Pagar" },
                { id: 20, nombre: "Marketing" },
                { id: 21, nombre: "Internet" },
                { id: 22, nombre: "Recibos" },
                { id: 23, nombre: "Pautas" },
                { id: 24, nombre: "Bonos" },
                { id: 25, nombre: "Comisiones" },
                { id: 26, nombre: "Insumos" },
                { id: 27, nombre: "Inversiones" },
                { id: 28, nombre: "Varios" }
            ]
        };

        function setMode(mode) {
            const isIngreso = mode === 'ingreso';
            document.getElementById('tipo').value = mode;
            
            // UI Changes
            const card = document.getElementById('main-card');
            const btnSave = document.getElementById('btn-save');
            const title = document.getElementById('form-title');
            const inputMonto = document.getElementById('monto');
            
            if(isIngreso) {
                card.className = "max-w-md w-full bg-white rounded-3xl shadow-2xl overflow-hidden border-t-[8px] transition-theme mode-ingreso";
                btnSave.className = "w-full py-4 rounded-2xl font-black text-white shadow-lg shadow-emerald-200 bg-emerald-500 hover:bg-emerald-600 active:scale-[0.98] transition-all flex items-center justify-center gap-2";
                title.innerText = "Nuevo Ingreso";
                inputMonto.focus();
                // Toggle buttons
                document.getElementById('btn-mode-ingreso').className = "py-2 text-xs font-black uppercase rounded-xl transition-all bg-white text-emerald-600 shadow-sm";
                document.getElementById('btn-mode-egreso').className = "py-2 text-xs font-black uppercase rounded-xl transition-all text-slate-400";
            } else {
                card.className = "max-w-md w-full bg-white rounded-3xl shadow-2xl overflow-hidden border-t-[8px] transition-theme mode-egreso";
                btnSave.className = "w-full py-4 rounded-2xl font-black text-white shadow-lg shadow-red-200 bg-red-500 hover:bg-red-600 active:scale-[0.98] transition-all flex items-center justify-center gap-2";
                title.innerText = "Nuevo Egreso";
                inputMonto.focus();
                // Toggle buttons
                document.getElementById('btn-mode-ingreso').className = "py-2 text-xs font-black uppercase rounded-xl transition-all text-slate-400";
                document.getElementById('btn-mode-egreso').className = "py-2 text-xs font-black uppercase rounded-xl transition-all bg-white text-red-600 shadow-sm";
            }
            
            renderCategories(mode);
        }

        function renderCategories(mode) {
            const select = document.getElementById('categoria');
            select.innerHTML = CATEGORIAS[mode].map(cat => `<option value="${cat.id}">${cat.nombre}</option>`).join('');
        }

        document.getElementById('transaction-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-save');
            const btnText = document.getElementById('btn-text');
            
            btn.disabled = true;
            btnText.innerText = "Procesando...";

            const payload = {
                tipo: document.getElementById('tipo').value,
                monto: parseFloat(document.getElementById('monto').value),
                sucursal_id: parseInt(document.getElementById('sucursal_id').value),
                fecha: document.getElementById('fecha').value,
                categoria_id: parseInt(document.getElementById('categoria').value),
                metodo_pago_id: parseInt(document.getElementById('metodo_pago_id').value),
                descripcion: document.getElementById('descripcion').value
            };

            const { error } = await supabaseClient.from('transacciones').insert([payload]);

            if (error) {
                alert("Error al guardar: " + error.message);
            } else {
                alert("✅ Registro guardado correctamente");
                e.target.reset();
                init();
            }

            btn.disabled = false;
            btnText.innerText = "Guardar Registro";
        });

        function init() {
            document.getElementById('fecha').valueAsDate = new Date();
            setMode('ingreso');
        }

        init();
    </script>
</body>
</html>
